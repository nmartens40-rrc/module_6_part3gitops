apiVersion: apps/v1
kind: Deployment
metadata:
    name: transactions-sync
    labels:
        app: transactions-sync
spec:
    replicas: 1
    selector:
        matchLabels:
            app: transactions-sync
    template:
        metadata:
            labels:
                app: transactions-sync
        spec:
            imagePullSecrets:
                - name: ghcr-creds
            containers:
                - name: syncer
                  image: ghcr.io/nmartens40-rrc/ddoe-assignment-6-syncer:876835e222b7990a33dd740d8d4762b1848c441f
                  env:
                      - name: SRC_URI
                        value: mongodb://mongo-backend:27017
                      - name: SRC_DB
                        value: bank_app
                      - name: DEST_URI
                        value: mongodb://mongo-transactions:27017
                      - name: DEST_DB
                        value: transactions_db
                      - name: INTERVAL_SECONDS
                        value: "300"
                  resources:
                      requests:
                          cpu: "25m"
                          memory: "64Mi"
                      limits:
                          cpu: "200m"
                          memory: "128Mi"
